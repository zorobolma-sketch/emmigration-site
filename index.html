<section id="apply" class="section">
  <div class="container">
    <div class="section-head">
      <h2>قدّم معلوماتك</h2>
      <p>بعد الإرسال سيتم توجيهك إلى واتساب لإكمال التحقق</p>
    </div>

    <form id="leadForm" class="lead-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="fullName">الاسم الكامل بالفرنسية</label>
          <input id="fullName" name="fullName" type="text" placeholder="Nom complet en français" required>
        </div>

        <div class="form-group">
          <label for="whatsapp">رقم الواتساب</label>
          <input id="whatsapp" name="whatsapp" type="text" placeholder="رقم الواتساب" required>
        </div>

        <div class="form-group">
          <label for="birthDate">تاريخ الازدياد</label>
          <input id="birthDate" name="birthDate" type="date" required>
        </div>

        <div class="form-group">
          <label for="country">الدولة</label>
          <input id="country" name="country" type="text" placeholder="الدولة" required>
        </div>
      </div>

      <div class="form-group">
        <label for="message">ملاحظات</label>
        <textarea id="message" name="message" rows="5" placeholder="ملاحظات"></textarea>
      </div>

      <button type="submit" class="submit-btn">إرسال الطلب</button>
      <p id="formMessage" class="form-message"></p>
    </form>
  </div>
</section>
